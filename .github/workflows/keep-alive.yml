name: Keep Supabase alive
on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: >
          curl -s -o /dev/null -w "%{http_code}"
          "${{ secrets.SUPABASE_URL }}/rest/v1/"
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
